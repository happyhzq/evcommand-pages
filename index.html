<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />

    <meta name="theme-color" content="#171a20" />
    <meta
      name="description"
      content="EV Command is a multilingual, read-only Tesla vehicle monitor with on-device snapshot history and CSV export."
      data-i18n-content="index.description"
    />
    <title data-i18n="index.title">EV Command</title>
    <link rel="stylesheet" href="./site.css" />
    <script type="module" src="./site.js" defer></script>
  </head>
  <body data-page="home">
    <a class="skip-link" href="#main-content" data-i18n="common.skip">Skip to main content</a>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand-link" href="./index.html">
          <span class="brand-mark" aria-hidden="true">EV</span>
          <span data-i18n="common.brand">EV Command</span>
        </a>
        <nav
          class="site-nav"
          aria-label="Primary navigation"
          data-i18n-aria-label="common.primaryNavigation"
        >
          <a class="nav-link" href="./index.html" aria-current="page" data-i18n="nav.home">Home</a>
          <a class="nav-link" href="./marketing.html" data-i18n="nav.product">Product</a>
          <a class="nav-link" href="./privacy.html" data-i18n="nav.privacy">Privacy</a>
          <a class="nav-link" href="./support.html" data-i18n="nav.support">Support</a>
          <a class="nav-link" href="./terms.html" data-i18n="nav.terms">Terms</a>
        </nav>
        <div class="locale-control">
          <label class="visually-hidden" for="locale-switcher" data-i18n="common.language">Language</label>
          <select
            id="locale-switcher"
            aria-label="Language"
            data-i18n-aria-label="common.language"
          >
            <option value="en-US" lang="en-US">English</option>
            <option value="zh-Hans" lang="zh-Hans">简体中文</option>
            <option value="yue-Hant-HK" lang="yue-Hant-HK">廣東話</option>
            <option value="ko" lang="ko">한국어</option>
            <option value="ja" lang="ja">日本語</option>
            <option value="es-ES" lang="es-ES">Español</option>
          </select>
        </div>
      </div>
    </header>
    <main id="main-content" class="site-main">
      <section class="document home-document">
        <p class="eyebrow" data-i18n="index.eyebrow">Read-only vehicle monitoring</p>
        <h1 data-i18n="index.heading">EV Command</h1>
        <p class="lead" data-i18n="index.intro">
          EV Command is a multilingual, read-only Tesla vehicle monitor with on-device snapshot history and CSV export.
        </p>
        <div class="home-links">
          <a class="home-link" href="./marketing.html" data-i18n="nav.product">Product</a>
          <a class="home-link" href="./privacy.html" data-i18n="nav.privacy">Privacy</a>

        </div>
